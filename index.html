<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Parcelliers</title>
<link rel="stylesheet" href="style.css">
<script type="module" src="main.js"></script>
</head>
<body>

<header>
  <div class="brand">
    <a href="index.html">
    <span class="leaf-icon">🌿</span>
    <span>Les Parcelliers</span>
    </a>
  </div>

  <div class="favorites">
    <span><i class="fa fa-heart"></i></span>
    <span><a href="#">Mes jardins favoris (1)</a></span>
  </div>
</header>

<main>

<div class="search-filters-panel">
  <div class="search-bar">
    <span class="search-icon"><i class="fa fa-search"></i></span>
    <input type="text" placeholder="Rechercher un jardin, une rue...">
  </div>

  <!-- Système de filtres -->
  <form class="filters">
    <span class="filters-label"><i class="fa fa-sliders"></i> Filtres (Bientôt disponible)</span>

    <details class="filter-select">
      <summary>Arrondissement <span class="badge-count"></span><span class="chevron">▾</span></summary>
      <fieldset class="filter-options">
        <label><input type="checkbox" name="arrondissement" value="1er"> 1er arr</label>
        <label><input type="checkbox" name="arrondissement" value="2eme"> 2ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="3eme"> 3ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="4eme"> 4ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="5eme"> 5ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="6eme"> 6ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="7eme"> 7ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="8eme"> 8ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="9eme"> 9ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="10eme"> 10ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="11eme"> 11ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="12eme"> 12ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="13eme"> 13ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="14eme"> 14ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="15eme"> 15ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="16eme"> 16ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="17eme"> 17ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="18eme"> 18ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="19eme"> 19ème arr</label>
        <label><input type="checkbox" name="arrondissement" value="20eme"> 20ème arr</label>
      </fieldset>
    </details>

    <details class="filter-select">
      <summary>Animateurs <span class="badge-count"></span><span class="chevron">▾</span></summary>
      <fieldset class="filter-options">
        <label><input type="checkbox" name="animateurs" value="baleine-verte"> Association La Baleine Verte</label>
        <label><input type="checkbox" name="animateurs" value="fleurs-de-ville"> Association Fleurs de Ville</label>
        <label><input type="checkbox" name="animateurs" value="jardins-solidaires"> Collectif Jardins Solidaires</label>
        <label><input type="checkbox" name="animateurs" value="ville-de-paris"> Ville de Paris</label>
        <label><input type="checkbox" name="animateurs" value="benevoles"> Bénévoles indépendants</label>
      </fieldset>
    </details>

    <details class="filter-select">
      <summary>Autour de moi <span class="badge-count"></span><span class="chevron">▾</span></summary>
      <fieldset class="filter-options">
        <label><input type="checkbox" name="distance" value="500m"> Moins de 500 m</label>
        <label><input type="checkbox" name="distance" value="1km"> Moins de 1 km</label>
        <label><input type="checkbox" name="distance" value="2km"> Moins de 2 km</label>
        <label><input type="checkbox" name="distance" value="5km"> Moins de 5 km</label>
        <label><input type="checkbox" name="distance" value="10km"> Moins de 10 km</label>
      </fieldset>
    </details>

    <button type="reset" class="reset-filters">Réinitialiser les filtres</button>
  </form>
</div>

<!-- Compteur résultats -->
<div class="list-header">
  <p class="results-count"></p>
  <div class="view-toggle">
    <button class="active"><i class="fa fa-list"></i>Vue liste</button>
    <button class="inactive"><i class="fa fa-map"></i>Vue carte (Bientôt disponible)</button>
  </div>
</div>
